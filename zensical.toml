[project]
site_name = "ra-hcp"
site_url = "https://ai-riksarkivet.github.io/hcp/"
site_description = "Hitachi Content Platform application — unified FastAPI service for S3-compatible object storage and HCP Management API operations."
site_author = "AI-Riksarkivet"
copyright = "Copyright &copy; 2026 AI-Riksarkivet"
repo_url = "https://github.com/AI-Riksarkivet/hcp"
repo_name = "AI-Riksarkivet/hcp"

nav = [
  { "ra-hcp" = [
    "index.md",
  ]},
  { "Getting Started" = [
    { "Quick Start" = "getting-started/index.md" },
    { "HCP Concepts" = "getting-started/concepts.md" },
    { "Configuration" = "getting-started/configuration.md" },
  ]},
  { "HCP Platform" = [
    { "Overview" = "hcp-platform/index.md" },
    { "Data Protection" = "hcp-platform/data-protection.md" },
    { "Administration" = "hcp-platform/administration.md" },
  ]},
  { "Architecture" = [
    { "Overview" = "architecture/index.md" },
    { "Backend" = "architecture/backend.md" },
    { "Storage Layer" = "architecture/storage.md" },
    { "Frontend" = "architecture/frontend.md" },
    { "Deployment" = "architecture/deployment.md" },
  ]},
  { "API Guide" = [
    { "Overview" = "api/index.md" },
    { "Authentication" = "api/authentication.md" },
    { "S3 Buckets" = "api/s3-buckets.md" },
    { "S3 Objects" = "api/s3-objects.md" },
    { "Tenants" = "api/tenants.md" },
    { "Namespaces" = "api/namespaces.md" },
    { "System" = "api/system.md" },
  ]},
  { "API Reference" = [
    { "Endpoints" = "api/reference/endpoints.md" },
    { "Common" = "api/reference/common.md" },
    { "S3" = "api/reference/s3.md" },
    { "Tenant" = "api/reference/tenant.md" },
    { "Namespace" = "api/reference/namespace.md" },
    { "User Account" = "api/reference/user-account.md" },
    { "Group Account" = "api/reference/group-account.md" },
    { "Content Class" = "api/reference/content-class.md" },
  ]},
  { "Components" = [
    { "UI Components" = "components/index.md" },
  ]},
]

extra_css = ["stylesheets/extra.css"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
custom_dir = "docs/overrides"
logo = "assets/ra.svg"
favicon = "assets/favicon.ico"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "content.tooltips",
    "content.footnote.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# ----------------------------------------------------------------------------
# Color palette (light/dark toggle)
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
primary = "blue"
accent = "light-blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "blue"
accent = "light-blue"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
# NOTE: Defining any extensions overrides Zensical defaults, so we must
# explicitly list all extensions we need (admonition, tables, toc, etc.).
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

# ----------------------------------------------------------------------------
# Plugins — mkdocstrings (auto-generated API reference from source)
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["backend"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
show_root_full_path = false
show_symbol_type_heading = true
show_symbol_type_toc = true
show_bases = true
merge_init_into_class = true
members_order = "source"
filters = ["!^_"]
