{{- if and .Values.ingress.enabled .Values.ingress.className -}}
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: {{ .Values.ingress.className }}
  labels:
    {{- include "ra-hcp.labels" . | nindent 4 }}
spec:
  controller: {{ .Values.ingress.controller | default "k8s.io/ingress-nginx" }}
{{- end }}
