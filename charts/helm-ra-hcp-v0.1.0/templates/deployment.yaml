apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ra-hcp.fullname" . }}
  labels:
    {{- include "ra-hcp.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ra-hcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ra-hcp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["gunicorn"]
          args:
            - "app.main:app"
            - "--worker-class"
            - "uvicorn.workers.UvicornWorker"
            - "--bind"
            - "0.0.0.0:8000"
            - "--workers"
            - "{{ .Values.backend.workers | default 1 }}"
            - "--max-requests"
            - "10000"
            - "--max-requests-jitter"
            - "1000"
            - "--timeout"
            - "120"
            - "--keep-alive"
            - "5"
            - "--worker-tmp-dir"
            - "/tmp"
            - "--control-socket-dir"
            - "/tmp"
            - "--access-logfile"
            - "-"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /liveness
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /liveness
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          envFrom:
            - configMapRef:
                name: {{ include "ra-hcp.fullname" . }}
            - secretRef:
                name: {{ include "ra-hcp.fullname" . }}
          env:
            {{- if .Values.opentelemetry.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.opentelemetry.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.opentelemetry.protocol | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.opentelemetry.serviceName | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.opentelemetry.resourceAttributes | quote }}
            {{- if .Values.opentelemetry.headers }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: {{ .Values.opentelemetry.headers | quote }}
            {{- end }}
            {{- end }}
            {{- if and .Values.redis.enabled (not (hasKey .Values.env "REDIS_URL")) }}
            - name: REDIS_URL
              value: "redis://{{ include "ra-hcp.redisFullname" . }}:{{ .Values.redis.port }}/0"
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
