replicaCount: 1

backend:
  workers: 2  # gunicorn workers per pod (scale pods with replicaCount)

imagePullSecrets: []
  # - name: regcred

image:
  repository: riksarkivet/ra-hcp
  tag: ""  # defaults to appVersion from Chart.yaml
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8000
  nodePort: 30081

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts: []
    # - host: dev-hcp.ra.se
  tls: []
    # - hosts:
    #     - dev-hcp.ra.se
    #   secretName: ra-se-secret

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Non-sensitive environment variables
# HCP_DOMAIN is the primary config — all tenant URLs are derived from it.
# Credentials come from the user's login, not from env vars.
env:
  HCP_DOMAIN: ""
  HCP_PORT: "9090"
  HCP_AUTH_TYPE: "hcp"
  HCP_VERIFY_SSL: "false"
  HCP_TIMEOUT: "60"
  CACHE_DEFAULT_TTL: "300"
  CACHE_STATS_TTL: "60"
  CACHE_CONFIG_TTL: "600"
  CACHE_S3_LIST_TTL: "120"
  CACHE_S3_META_TTL: "300"
  CACHE_KEY_PREFIX: "hcp"
  API_TOKEN_EXPIRE_MINUTES: "480"
  CORS_ORIGINS: ""
  ROOT_PATH: ""

# Sensitive environment variables (stored in a Secret)
secret:
  API_SECRET_KEY: "change-me-in-production"

opentelemetry:
  enabled: false
  endpoint: "http://otel-collector:4318"
  protocol: "http/protobuf"
  serviceName: "ra-hcp"
  resourceAttributes: "deployment.environment=dev"
  headers: ""

frontend:
  enabled: false
  image:
    repository: riksarkivet/ra-hcp-frontend
    tag: ""  # defaults to appVersion from Chart.yaml
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: NodePort
    port: 5174
    targetPort: 8000
    nodePort: 30517
  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 100m
    #   memory: 256Mi
  env:
    BACKEND_URL: ""

redis:
  enabled: false
  image:
    repository: redis
    tag: "8.0.1-alpine"
    pullPolicy: IfNotPresent
  port: 6379
  resources: {}
    # limits:
    #   cpu: 200m
    #   memory: 128Mi
    # requests:
    #   cpu: 50m
    #   memory: 64Mi

# Health probe configuration
# startupProbe: allows slow starts (cache connect, MAPI init)
#   Kubernetes waits up to failureThreshold × periodSeconds (default: 10×3 = 30s)
#   before killing the pod. No liveness/readiness checks run until startup passes.
# livenessProbe: /liveness — is the process alive? Restart if not.
# readinessProbe: /readiness — are backends (HCP, Redis) reachable? Remove from
#   service if not, but don't restart.
probes:
  startup:
    failureThreshold: 10
    periodSeconds: 3
  liveness:
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    periodSeconds: 5
    failureThreshold: 2

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  maxUnavailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Frontend container security context (separate from backend because Deno needs write access)
frontendSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]
