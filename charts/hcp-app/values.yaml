replicaCount: 1

image:
  repository: hcp-app
  tag: "latest"  # set to "" to use appVersion from Chart.yaml
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Non-sensitive environment variables
env:
  HCP_HOST: "admin.hcp.example.com"
  HCP_PORT: "9090"
  HCP_AUTH_TYPE: "hcp"
  HCP_VERIFY_SSL: "false"
  HCP_TIMEOUT: "60"
  S3_ENDPOINT_URL: "https://s3.hcp.example.com"
  S3_REGION: "us-east-1"
  REDIS_URL: ""
  CACHE_DEFAULT_TTL: "300"
  CACHE_STATS_TTL: "60"
  CACHE_CONFIG_TTL: "600"
  CACHE_S3_LIST_TTL: "120"
  CACHE_S3_META_TTL: "300"
  CACHE_KEY_PREFIX: "hcp"
  API_TOKEN_EXPIRE_MINUTES: "480"
  ROOT_PATH: ""

# Sensitive environment variables (stored in a Secret)
secret:
  HCP_USERNAME: ""
  HCP_PASSWORD: ""
  API_SECRET_KEY: "change-me-in-production"

opentelemetry:
  enabled: false
  endpoint: "http://otel-collector:4317"
  protocol: "grpc"
  serviceName: "hcp-app"

frontend:
  enabled: false
  image:
    repository: hcp-app-frontend
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
    targetPort: 8000
  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 100m
    #   memory: 256Mi
  env:
    BACKEND_URL: ""

redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  port: 6379
  resources: {}
    # limits:
    #   cpu: 200m
    #   memory: 128Mi
    # requests:
    #   cpu: 50m
    #   memory: 64Mi

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  maxUnavailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
