name: Documentation
on:
  push:
    branches:
      - master
      - main
permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Build Zensical docs (with mkdocstrings for auto-generated API reference)
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x
      - run: pip install zensical mkdocstrings-python
      - run: zensical build --clean
        env:
          PYTHONPATH: backend

      # Build Storybook and embed in docs site
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Build Storybook
        working-directory: frontend
        run: bun run build-storybook
      - name: Copy Storybook into docs site
        run: cp -r frontend/storybook-static site/storybook

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: gh-pages
          folder: site
          clean-exclude: _preview
