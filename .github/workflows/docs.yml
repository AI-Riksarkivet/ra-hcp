name: Documentation
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Build Zensical docs (with mkdocstrings for auto-generated API reference)
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install zensical mkdocstrings-python
      - run: zensical build --clean
        env:
          PYTHONPATH: backend

      # Build Storybook and embed in docs site
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install frontend dependencies
        working-directory: frontend
        run: deno install
      - name: Build Storybook
        working-directory: frontend
        run: deno task build-storybook
      - name: Copy Storybook into docs site
        run: cp -r frontend/storybook-static site/storybook

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          clean-exclude: _preview
