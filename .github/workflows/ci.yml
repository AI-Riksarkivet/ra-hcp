name: Tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run checks
        uses: dagger/dagger-for-github@v8.4.0
        with:
          verb: call
          args: checks --source=.

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        uses: dagger/dagger-for-github@v8.4.0
        with:
          verb: call
          args: test-coverage --source=.

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run integration tests
        uses: dagger/dagger-for-github@v8.4.0
        with:
          verb: call
          args: test-integration --source=.
