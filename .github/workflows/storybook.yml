name: Storybook

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "frontend/**"
      - ".github/workflows/storybook.yml"
  workflow_dispatch:

permissions: {}

concurrency: preview-${{ github.event.number }}

jobs:
  preview:
    name: Storybook Preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Bun
        if: github.event.action != 'closed'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: github.event.action != 'closed'
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build Storybook
        if: github.event.action != 'closed'
        working-directory: frontend
        env:
          STORYBOOK_BASE: /ra-hcp/_preview/pr-${{ github.event.number }}/
        run: bun run build-storybook

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: frontend/storybook-static
          preview-branch: gh-pages
          umbrella-dir: _preview
