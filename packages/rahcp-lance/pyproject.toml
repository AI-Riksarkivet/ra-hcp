[project]
name = "rahcp-lance"
version = "0.1.0"
description = "Lance dataset operations over HCP S3"
requires-python = ">=3.13"
dependencies = [
    "rahcp-client",
    "lancedb>=0.29",
    "pyarrow>=17.0",
    "pydantic>=2.12",
]

[tool.uv.sources]
rahcp-client = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
