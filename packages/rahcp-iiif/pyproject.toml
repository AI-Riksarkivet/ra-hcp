[project]
name = "rahcp-iiif"
version = "0.1.0"
description = "Async IIIF image downloader with resumable tracking"
requires-python = ">=3.13"
dependencies = ["rahcp-tracker", "httpx>=0.28"]

[project.optional-dependencies]
validate = ["rahcp-validate"]

[tool.uv.sources]
rahcp-tracker = { workspace = true }
rahcp-validate = { workspace = true }

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.25", "respx>=0.22"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
