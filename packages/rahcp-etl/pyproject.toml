[project]
name = "rahcp-etl"
version = "0.1.0"
description = "Stateful ETL orchestration with JetStream"
requires-python = ">=3.13"
dependencies = ["rahcp-client", "nats-py>=2.9", "tenacity>=8.1"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.25"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.uv.sources]
rahcp-client = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
