# rahcp CLI configuration
# Copy to ~/.rahcp/config.yaml and fill in your credentials
#
# Usage:
#   cp .rahcp.example.yaml ~/.rahcp/config.yaml
#   uv run rahcp s3 ls              # uses default profile
#   uv run rahcp -c prod s3 ls      # uses "prod" profile

default: dev

profiles:
  dev:
    endpoint: http://localhost:8000/api/v1
    username: ""
    password: ""
    tenant: ""

  # prod:
  #   endpoint: https://hcp.internal/api/v1
  #   username: admin
  #   password: ""
  #   tenant: prod-archive
