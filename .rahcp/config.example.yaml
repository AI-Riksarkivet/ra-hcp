default: dev

profiles:
  dev:
    endpoint: http://localhost:8000/api/v1
    username: 
    password: 
    tenant: dev-ai
    verify_ssl: false

    # Bulk transfer tuning
    bulk_workers: 40
    bulk_presign_batch_size: 200       # URLs presigned per API call
    bulk_chunk_size: 4194304           # 4 MB — chunk size for streaming large files
    bulk_stream_threshold: 104857600   # 100 MB — files below this are read in one shot
    bulk_progress_interval: 5.0
    bulk_queue_depth: 8
    bulk_tracker_flush_every: 500

    # IIIF download settings
    iiif_url: https://iiif.test.se
    iiif_timeout: 60
    iiif_query_params: full/max/0/default.jpg
    iiif_workers: 4
